<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS411 - Computer Networks    </style>

</title>
    <script>
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #61223B;
            --text: #333333;
            --bg-light: #F5F5F5;
            --border: #CCCCCC;
            --link: #0779BF;
            --white: #FFFFFF;
        }
        body {
            background-color: var(--white);
            color: var(--text);
            font-family: 'Raleway', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            transition: all 0.3s ease;
        }
        /* ===== DARK MODE STYLES ===== */
        [data-theme="dark"] {
            --primary: #9B4D7D !important;
            --text: #E8E8E8 !important;
            --bg-light: #2A2A2A !important;
            --border: #444444 !important;
            --link: #64B5F6 !important;
            --white: #1E1E1E !important;
        }

        [data-theme="dark"] body { transition: all 0.3s ease;
            background-color: #1E1E1E !important;
            color: #E8E8E8 !important;
        }

        [data-theme="dark"] header {
            background-color: #1E1E1E !important;
        }

        [data-theme="dark"] footer {
            background-color: #1a1420 !important;
        }

        [data-theme="dark"] nav a {
            color: #E8E8E8 !important;
        }

        [data-theme="dark"] nav a:hover {
            color: #9B4D7D !important;
        }

        [data-theme="dark"] .card {
            background-color: #2A2A2A !important;
            border-color: #444444 !important;
            color: #E8E8E8 !important;
        }

        [data-theme="dark"] .content-section {
            background-color: #2A2A2A !important;
            border-color: #444444 !important;
            color: #E8E8E8 !important;
        }

        [data-theme="dark"] .course-header {
            background-color: #2A2A2A !important;
            border-color: #444444 !important;
        }

        [data-theme="dark"] .breadcrumb {
            background-color: #2A2A2A !important;
            border-color: #444444 !important;
        }

        [data-theme="dark"] .meta-item {
            background-color: #2A2A2A !important;
            border-color: #444444 !important;
            color: #E8E8E8 !important;
        }

        [data-theme="dark"] .assessment-item {
            background-color: #333333 !important;
        }

        [data-theme="dark"] .instructor {
            background-color: #2A2A2A !important;
            color: #E8E8E8 !important;
        }

        [data-theme="dark"] h1,
        [data-theme="dark"] h2,
        [data-theme="dark"] h3,
        [data-theme="dark"] h4,
        [data-theme="dark"] h5,
        [data-theme="dark"] h6 {
            color: #9B4D7D !important;
        }

        [data-theme="dark"] p,
        [data-theme="dark"] li {
            color: #E8E8E8 !important;
        }

        [data-theme="dark"] a {
            color: #64B5F6 !important;
        }

        [data-theme="dark"] .spec-button {
            background-color: #9B4D7D !important;
            color: white !important;
        }

        [data-theme="dark"] input,
        [data-theme="dark"] textarea {
            background-color: #2A2A2A !important;
            color: #E8E8E8 !important;
            border-color: #444444 !important;
        }
