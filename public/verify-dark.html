<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Verification</title>
    <style>
        :root {
            --bg: white;
            --text: black;
        }
        
        /* THIS IS THE DARK MODE CSS */
        [data-theme="dark"] {
            --bg: #1E1E1E;
            --text: #E8E8E8;
        }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 40px;
            font-family: Arial, sans-serif;
            transition: all 0.3s ease;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .box {
            background-color: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        [data-theme="dark"] .box {
            background-color: #333;
        }
        
        .status {
            padding: 10px;
            background-color: #e8f4f8;
            border-left: 4px solid #0088cc;
            margin-top: 20px;
        }
        
        [data-theme="dark"] .status {
            background-color: #1a3a40;
            border-left-color: #64B5F6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dark Mode Test</h1>
        <p>Click the button below to toggle dark mode:</p>
        
        <button id="theme-toggle">🌙 Toggle Dark Mode</button>
        
        <div class="box">
            <h2>Test Box 1</h2>
            <p>This box should change background color when you click the button above.</p>
        </div>
        
        <div class="box">
            <h2>Test Box 2</h2>
            <p>Page background and text color should also change.</p>
        </div>
        
        <div class="status">
            <strong>Current Mode:</strong> <span id="mode-display">Light</span>
            <br>
            <strong>data-theme attribute:</strong> <span id="attr-display">not set</span>
        </div>
    </div>

    <script>
        console.log('=== Dark Mode Script Started ===');
        
        function initDarkMode() {
            console.log('initDarkMode function called');
            
            const button = document.getElementById('theme-toggle');
            const html = document.documentElement;
            const modeDisplay = document.getElementById('mode-display');
            const attrDisplay = document.getElementById('attr-display');
            
            if (!button) {
                console.error('ERROR: Button not found!');
                return;
            }
            
            console.log('Button found:', button);
            
            // Load saved preference
            const isDark = localStorage.getItem('darkMode') === 'true';
            console.log('Saved preference isDark:', isDark);
            
            if (isDark) {
                html.setAttribute('data-theme', 'dark');
                button.textContent = '☀️ Toggle Light Mode';
                modeDisplay.textContent = 'Dark';
                attrDisplay.textContent = 'dark';
                console.log('Applied dark mode from saved preference');
            } else {
                attrDisplay.textContent = 'not set';
                console.log('Light mode (default)');
            }
            
            // Add click listener
            button.addEventListener('click', function(e) {
                console.log('BUTTON CLICKED!');
                e.preventDefault();
                
                const currentTheme = html.getAttribute('data-theme');
                console.log('Current theme attribute:', currentTheme);
                
                const newDarkMode = currentTheme !== 'dark';
                console.log('Setting to dark mode:', newDarkMode);
                
                if (newDarkMode) {
                    html.setAttribute('data-theme', 'dark');
                    button.textContent = '☀️ Toggle Light Mode';
                    modeDisplay.textContent = 'Dark';
                    attrDisplay.textContent = 'dark';
                    console.log('Switched TO dark mode');
                } else {
                    html.removeAttribute('data-theme');
                    button.textContent = '🌙 Toggle Dark Mode';
                    modeDisplay.textContent = 'Light';
                    attrDisplay.textContent = 'not set';
                    console.log('Switched TO light mode');
                }
                
                localStorage.setItem('darkMode', newDarkMode);
                console.log('Saved to localStorage:', newDarkMode);
            });
            
            console.log('Event listener attached to button');
        }
        
        // Wait for DOM to be ready
        if (document.readyState === 'loading') {
            console.log('DOM still loading, waiting for DOMContentLoaded');
            document.addEventListener('DOMContentLoaded', function() {
                console.log('DOMContentLoaded fired');
                initDarkMode();
            });
        } else {
            console.log('DOM already loaded');
            initDarkMode();
        }
    </script>
</body>
</html>
